name: "CodeQL Analysis"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '06 12 * * *'

jobs:
  analyze:
    name: Analyze
    runs-on: 'ubuntu-latest'
    timeout-minutes: 360
    permissions:
      actions: read
      contents: read
      security-events: write
      id-token: write
      packages: write
    strategy:
      fail-fast: false
      matrix:
        language: [ 'csharp' ]


    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        submodules: 'true'
        ref: ${{ github.ref }}
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: ${{ matrix.language }}
    # - name: Add GitHub Package Registry to get access to beta builds
    #   run: dotnet nuget add source --username AptiviCEO --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text --name github "https://nuget.pkg.github.com/Aptivi/index.json"
    - name: Build
      run: |
        make rel-ci
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:${{matrix.language}}"
